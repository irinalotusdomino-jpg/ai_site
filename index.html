<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Reels Creator — контент, якого ще не існувало</title>
<meta name="description" content="AI Reels Creator створює Reels, рекламу та AI-візуали, яких ще не існувало. Дивись приклади в Instagram @new_ai_life.">
</head>
<body>

<!--
  ============================================================
  WOW-ЕФЕКТ №1 — "ЗАПУСК AI"
  Темний екран → блимає курсор → друкується текст →
  сканування користувача → інтерфейс збирається зі світла.
  Вимикається/налаштовується через CONFIG.effects.bootSequence
  та CONFIG.boot нижче. Якщо JS вимкнено — цей блок просто
  не показується (display:none за замовчуванням), і сторінка
  одразу видима — це не ламає SEO та доступність.
  ============================================================
-->
<div class="rl-boot" id="rlBoot" aria-hidden="true">
  <div class="rl-boot__grid"></div>
  <div class="rl-boot__scanline"></div>
  <div class="rl-boot__corners">
    <span class="c c-tl"></span><span class="c c-tr"></span><span class="c c-bl"></span><span class="c c-br"></span>
  </div>
  <div class="rl-boot__console">
    <span id="rlBootText"></span><span class="rl-boot__percent" id="rlBootPercent">0%</span><span class="rl-boot__cursor"></span>
  </div>
  <div class="rl-boot__flash"></div>
  <button type="button" class="rl-boot__skip" id="rlBootSkip">Пропустити ⌁</button>
</div>

<!--
  ============================================================
  AI REELS CREATOR — HERO-БЛОК, ВАРІАНТ 3: "СТУДІЯ НА СТОЛІ"
  Ідея: стіл арт-директора — приколоті знімки, і телефон, що
  програє справжній Reels з UI-накладкою Instagram.
  Реальне лого, реальні фото, реальне відео.
  Готово для GitHub Pages: index.html + /assets.
  Всі налаштування — в CONFIG нижче.
  ============================================================
-->
<section class="rl-hero" id="rlHero">

  <div class="rl-decor" aria-hidden="true">
    <div class="rl-glow rl-glow--1"></div>
    <div class="rl-glow rl-glow--2"></div>
    <svg class="rl-spark rl-spark--1" viewBox="0 0 24 24"><path d="M12 0 L14 10 L24 12 L14 14 L12 24 L10 14 L0 12 L10 10 Z"/></svg>
    <svg class="rl-spark rl-spark--2" viewBox="0 0 24 24"><path d="M12 0 L14 10 L24 12 L14 14 L12 24 L10 14 L0 12 L10 10 Z"/></svg>
  </div>

  <!-- WOW-ЕФЕКТ №2: живе нейронне поле, що реагує на курсор — canvas-шар позаду контенту -->
  <canvas class="rl-neural" id="rlNeural" aria-hidden="true"></canvas>

  <div class="rl-inner">

    <div class="rl-content">
      <div class="rl-brand rl-reveal">
        <img id="rlLogo" class="rl-brand__logo" src="" alt="" />
        <span class="rl-brand__name">AI Reels Creator</span>
      </div>

      <p class="rl-eyebrow rl-reveal" id="rlEyebrow"></p>

      <span id="rlHeadingSlot"></span>

      <p class="rl-sub rl-reveal" id="rlSub"></p>

      <div class="rl-cta rl-reveal" id="rlButtons"></div>

      <div class="rl-handle rl-reveal" id="rlHandle"></div>
    </div>

    <div class="rl-visual">

      <!-- WOW: парящa AI-сфера (замінює телефон) -->
      <div class="rl-orb-wrap rl-reveal" id="rlOrb">
        <div class="rl-orb-breathe">
          <div class="rl-orb-glow" aria-hidden="true"></div>
          <div class="rl-orb-wave" id="rlOrbWave" aria-hidden="true"></div>
          <div class="rl-orb" id="rlOrbCore">
            <canvas class="rl-orb-canvas" id="rlOrbCanvas"></canvas>
            <svg class="rl-orb-lines" id="rlOrbLines" viewBox="0 0 100 100" aria-hidden="true">
              <circle cx="50" cy="50" r="34" />
              <circle cx="50" cy="50" r="24" />
              <path d="M50 6 L50 94" />
              <path d="M6 50 L94 50" />
            </svg>
          </div>
        </div>
      </div>

      <!-- 4 "вікна" з контентом: 2 фото + 2 відео -->
      <div class="rl-windows" id="rlWindows"></div>
    </div>

  </div>

  <div class="rl-social rl-reveal" id="rlSocial">
    <span class="rl-social__divider" aria-hidden="true"></span>
    <span class="rl-social__label" id="rlSocialLabel"></span>
    <div class="rl-social__row" id="rlSocialRow"></div>
  </div>
</section>

<script>
(function () {
  /* ==========================================================
     CONFIG — ВСІ НАЛАШТУВАННЯ БЛОКУ
     ========================================================== */
  var CONFIG = {

    /* h1 — якщо блок ПЕРШИЙ на сторінці, h2 — якщо ні */
    headingLevel: "h1", /* ЗМІНИТИ на "h2", якщо блок не перший на сторінці */

    /* --- Кольори --- */
    colors: {
      bg:        "#1E1622", /* ЗМІНИТИ — фон секції (глибокий сливовий) */
      bg2:       "#140E17", /* ЗМІНИТИ — другий тон фону для градієнта */
      cream:     "#F6EEE0", /* ЗМІНИТИ — основний світлий текст */
      gold:      "#C9A24B", /* ЗМІНИТИ — акцент (бронза/золото) */
      goldSoft:  "#E4C878", /* ЗМІНИТИ — світліший відтінок золота (курсив у заголовку) */
      mango:     "#E8792B", /* ЗМІНИТИ — акцент дії (кнопка, іскри) */
      ink:       "#0E0A10", /* ЗМІНИТИ — майже чорний, для рамки телефону */
      btnPrimaryText: "#1E1622", /* ЗМІНИТИ — колір тексту основної кнопки (!important) */
      btnOutlineText: "#F6EEE0"  /* ЗМІНИТИ — колір тексту другої кнопки (!important) */
    },

    /* --- Шрифти (Google Fonts) --- */
    fontHeading: "Fraunces", /* ЗМІНИТИ — редакційний serif для заголовка */
    fontBody: "Sora", /* ЗМІНИТИ — шрифт тексту й кнопок */
    fontHeadingUrl: "@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&display=swap');", /* ЗМІНИТИ */
    fontBodyUrl: "@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap');", /* ЗМІНИТИ */

    /* --- Лого ---
       Точний шлях у репозиторії GitHub: <репозиторій>/assets/logo.png
       Файл має лежати в папці assets поруч із index.html. */
    logo: {
      src: "assets/logo.png", /* ЗМІНИТИ шлях, якщо перенесете файл */
      alt: "Лого AI Reels Creator — тукан у вигляді ананаса з хлопавкою оператора"
    },

    /* --- Тексти --- */
    eyebrow: "AI CONTENT STUDIO · REELS · ADS · VISUALS",
    headingLine1: "Кадри, яких ще",
    headingLine2: "ніхто не знімав", /* виділяється курсивом золотого кольору */
    subheading: "AI Reels Creator створює образи, ролики та рекламні кадри, яких раніше просто не існувало. Жодної камери, жодної студії — тільки ідея і штучний інтелект, що знає, як зробити так, щоб на це дивились.",
    handle: "@new_ai_life",
    handleCaption: "нові кадри щотижня — дивись у Reels",

    /* --- Кнопки --- */
    buttons: [
      {
        text: "Переглянути Reels в Instagram", /* ЗМІНИТИ */
        url: "https://www.instagram.com/new_ai_life?utm_source=ig_web_button_share_sheet", /* ЗМІНИТИ */
        style: "primary"
      },
      {
        text: "Обговорити свій проєкт", /* ЗМІНИТИ */
        url: "https://ig.me/m/new_ai_life", /* ЗМІНИТИ */
        style: "outline"
      }
    ],

    /* --- 4 "вікна" з контентом: 2 фото + 2 відео ---
       ТОЧНІ ШЛЯХИ У РЕПОЗИТОРІЇ GITHUB (все лежить в папці assets/
       поруч з index.html — саме так, як в архіві, який ти завантажуєш):

         <репозиторій>/
         ├── index.html
         └── assets/
             ├── photo.png
             ├── photo2.png
             ├── reel.mp4
             ├── reel2.mp4
             ├── poster.png     (кадр-заглушка для reel.mp4)
             ├── poster2.png    (кадр-заглушка для reel2.mp4)
             └── logo.png

       Якщо файли не завантажуються на живому сайті — 99% причина:
       назви/регістр не співпадають (GitHub Pages чутливий до регістру:
       Photo.PNG ≠ photo.png), або папку assets завантажили не цілком.
       Просто тримай назви файлів такими, як тут прописано. */
    windows: [
      {
        type: "video",
        label: "reel.mp4",
        src: "assets/reel.mp4",
        poster: "assets/poster.png",
        alt: "AI reel — приклад згенерованого відео для соцмереж"
      },
      {
        type: "photo",
        label: "photo.png",
        src: "assets/photo.png",
        alt: "AI-візуал — рекламне фото, створене без зйомки"
      },
      {
        type: "photo",
        label: "photo2.png",
        src: "assets/photo2.png",
        alt: "AI-візуал — стильний рекламний кадр для бренду одягу"
      },
      {
        type: "video",
        label: "reel2.mp4",
        src: "assets/reel2.mp4",
        poster: "assets/poster2.png",
        alt: "AI reel — другий приклад згенерованого відео"
      }
    ],

    /* --- WOW-ефект №3: парюча AI-сфера (замінює мокап телефону) --- */
    orb: {
      bg: "#050816",       /* ЗМІНИТИ — базовий колір ядра сфери */
      colorA: "#7C3AED",   /* ЗМІНИТИ — фіолетове світіння */
      colorB: "#22D3EE",   /* ЗМІНИТИ — бірюзове світіння */
      size: 168,           /* ЗМІНИТИ — розмір сфери на десктопі, px (120–180) */
      sizeTablet: 140,     /* ЗМІНИТИ — розмір на планшеті, px */
      sizeMobile: 116,     /* ЗМІНИТИ — розмір на телефоні, px */
      blur: 54,            /* ЗМІНИТИ — розмиття зовнішнього світіння, px (40–60) */
      particles: 16        /* ЗМІНИТИ — кількість часток усередині сфери */
    },

    /* --- WOW-ефекти --- */
    effects: {
      bootSequence: true, /* ЗМІНИТИ на false, щоб вимкнути екран запуску AI */
      neuralCursor: true, /* ЗМІНИТИ на false, щоб вимкнути живе нейронне поле під курсором */
      orb: true            /* ЗМІНИТИ на false, щоб вимкнути AI-сферу */
    },

    /* --- Налаштування екрана запуску AI (WOW-ефект №1) --- */
    boot: {
      lines: [
        { text: "Initializing AI...", mode: "type" }, /* ЗМІНИТИ */
        { text: "Сканування відвідувача...", mode: "scan" }, /* ЗМІНИТИ */
        { text: "Профіль розпізнано — AI Reels Creator ✓", mode: "type" } /* ЗМІНИТИ */
      ],
      typeSpeedMs: 34, /* ЗМІНИТИ швидкість друку (мс на символ) */
      holdMs: 380,     /* ЗМІНИТИ паузу після кожного рядка */
      scanMs: 900,     /* ЗМІНИТИ тривалість сканування/лічильника % */
      initialDelayMs: 550 /* ЗМІНИТИ паузу з самотнім блимаючим курсором на старті */
    },

    /* --- Налаштування нейронного поля курсора (WOW-ефект №2) --- */
    neural: {
      density: 1,            /* ЗМІНИТИ (0.5–2) — щільність часток відносно площі блоку */
      connectDistance: 118,  /* ЗМІНИТИ — на якій відстані частки зʼєднуються лініями (px) */
      pointerRadius: 190,    /* ЗМІНИТИ — радіус "спотлайту" й притягання навколо курсора (px) */
      maxParticles: 70       /* ЗМІНИТИ — верхня межа кількості часток (для продуктивності) */
    },

    /* --- Соціальні мережі / контакти (нижній рядок іконок) --- */
    socialLabel: "На звʼязку", /* ЗМІНИТИ підпис над іконками */
    socials: [
      { icon: "email",     label: "Написати на email",  url: "mailto:ai.life.email@gmail.com" }, /* ЗМІНИТИ */
      { icon: "tiktok",    label: "TikTok",              url: "https://www.tiktok.com/@new_ai_life" }, /* ЗМІНИТИ */
      { icon: "youtube",   label: "YouTube",             url: "https://www.youtube.com/@new_ai_life" }, /* ЗМІНИТИ */
      { icon: "cartoon",   label: "AI Cartoons",         url: "https://www.youtube.com/channel/UCBZM9fpbuR8BS4x98cklFsQ" }, /* ЗМІНИТИ */
      { icon: "pinterest", label: "Pinterest",           url: "https://www.pinterest.com/new_ai_life/" } /* ЗМІНИТИ */
    ]
  };

  /* ==========================================================
     СТИЛІ
     ========================================================== */
  var css = ""
    + CONFIG.fontHeadingUrl + "\n"
    + CONFIG.fontBodyUrl + "\n"
    + "#rlHero{"
    +   "--rl-bg:" + CONFIG.colors.bg + ";"
    +   "--rl-bg2:" + CONFIG.colors.bg2 + ";"
    +   "--rl-cream:" + CONFIG.colors.cream + ";"
    +   "--rl-gold:" + CONFIG.colors.gold + ";"
    +   "--rl-gold-soft:" + CONFIG.colors.goldSoft + ";"
    +   "--rl-mango:" + CONFIG.colors.mango + ";"
    +   "--rl-ink:" + CONFIG.colors.ink + ";"
    +   "--rl-btn-primary-text:" + CONFIG.colors.btnPrimaryText + ";"
    +   "--rl-btn-outline-text:" + CONFIG.colors.btnOutlineText + ";"
    +   "--rl-font-heading:'" + CONFIG.fontHeading + "', serif;"
    +   "--rl-font-body:'" + CONFIG.fontBody + "', sans-serif;"
    +   "--rl-orb-bg:" + CONFIG.orb.bg + ";"
    +   "--rl-orb-a:" + CONFIG.orb.colorA + ";"
    +   "--rl-orb-b:" + CONFIG.orb.colorB + ";"
    +   "--rl-orb-blur:" + CONFIG.orb.blur + "px;"
    +   "--rl-orb-d:" + CONFIG.orb.size + "px;"
    + "}"
    + "@media(max-width:900px){#rlHero{--rl-orb-d:" + CONFIG.orb.sizeTablet + "px;}}"
    + "@media(max-width:480px){#rlHero{--rl-orb-d:" + CONFIG.orb.sizeMobile + "px;}}"
    + "\n*{box-sizing:border-box;}"
    + "body{margin:0;}"
    + ".rl-hero{position:relative;overflow:hidden;background:radial-gradient(120% 130% at 78% 8%, var(--rl-bg2) 0%, var(--rl-bg) 60%);padding:120px 32px;font-family:var(--rl-font-body);isolation:isolate;}"
    + ".rl-inner{position:relative;z-index:3;max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1.08fr 0.92fr;gap:70px;align-items:center;}"
    + "@media(max-width:960px){.rl-inner{grid-template-columns:1fr;gap:88px;}.rl-hero{padding:80px 22px 100px;}}"

    /* декор */
    + ".rl-decor{position:absolute;inset:0;z-index:1;pointer-events:none;}"
    + ".rl-glow{position:absolute;border-radius:50%;filter:blur(70px);}"
    + ".rl-glow--1{width:520px;height:520px;background:var(--rl-mango);opacity:.16;top:-180px;right:-120px;}"
    + ".rl-glow--2{width:460px;height:460px;background:var(--rl-gold);opacity:.12;bottom:-200px;left:-140px;}"
    + ".rl-spark{position:absolute;width:16px;height:16px;fill:var(--rl-gold-soft);opacity:.7;animation:rlTwinkle 3.6s ease-in-out infinite;}"
    + ".rl-spark--1{top:10%;left:44%;animation-delay:.4s;}"
    + ".rl-spark--2{bottom:14%;right:6%;width:12px;height:12px;animation-delay:1.6s;}"
    + "@keyframes rlTwinkle{0%,100%{opacity:.25;transform:scale(.75)}50%{opacity:.9;transform:scale(1.05)}}"

    /* бренд */
    + ".rl-brand{display:flex;align-items:center;gap:12px;margin-bottom:30px;}"
    + ".rl-brand__logo{width:40px;height:40px;border-radius:10px;object-fit:cover;box-shadow:0 6px 18px rgba(0,0,0,.4);}"
    + ".rl-brand__name{font-family:var(--rl-font-body);font-weight:600;font-size:14px;letter-spacing:.04em;color:var(--rl-cream);opacity:.85;}"

    /* eyebrow */
    + ".rl-eyebrow{display:inline-block;margin:0 0 22px;padding:0;font-family:var(--rl-font-body);font-weight:600;font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--rl-gold-soft);}"

    /* заголовок */
    + ".rl-heading{font-family:var(--rl-font-heading);font-weight:400;color:var(--rl-cream);font-size:64px;line-height:1.08;letter-spacing:-.01em;margin:0 0 26px;}"
    + ".rl-heading em{font-style:italic;font-weight:500;color:var(--rl-gold-soft);}"
    + "@media(max-width:960px){.rl-heading{font-size:46px;}}"
    + "@media(max-width:480px){.rl-heading{font-size:36px;}}"

    /* підзаголовок */
    + ".rl-sub{font-size:17.5px;line-height:1.7;color:var(--rl-cream);opacity:.68;max-width:470px;margin:0 0 36px;font-weight:400;}"

    /* кнопки */
    + ".rl-cta{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:26px;}"
    + ".rl-btn{display:inline-flex;align-items:center;justify-content:center;padding:16px 27px;border-radius:999px;font-family:var(--rl-font-body);font-weight:600;font-size:14.5px;text-decoration:none !important;transition:transform .18s ease, box-shadow .18s ease, background .18s ease, border-color .18s ease;border:1.5px solid transparent;cursor:pointer;}"
    + ".rl-btn:focus-visible{outline:3px solid var(--rl-gold-soft);outline-offset:3px;}"
    + ".rl-btn--primary{background:var(--rl-mango);color:var(--rl-btn-primary-text) !important;box-shadow:0 14px 28px -12px rgba(232,121,43,.7);}"
    + ".rl-btn--primary:hover{transform:translateY(-2px);box-shadow:0 18px 32px -12px rgba(232,121,43,.8);}"
    + ".rl-btn--outline{background:transparent;border-color:rgba(246,238,224,.35);color:var(--rl-btn-outline-text) !important;}"
    + ".rl-btn--outline:hover{border-color:var(--rl-cream);background:rgba(246,238,224,.06);transform:translateY(-2px);}"

    /* хендл */
    + ".rl-handle{display:flex;align-items:baseline;gap:8px;font-size:13.5px;color:var(--rl-cream);opacity:.55;}"
    + ".rl-handle strong{color:var(--rl-gold-soft);opacity:1;font-weight:600;}"

    /* --- візуальна колонка: сфера + сітка вікон --- */
    + ".rl-visual{position:relative;justify-self:center;width:100%;display:flex;flex-direction:column;align-items:center;}"

    /* WOW-ефект №3: парюча AI-сфера */
    + ".rl-orb-wrap{position:relative;width:var(--rl-orb-d);height:var(--rl-orb-d);margin:0 auto 42px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .1s linear;}"
    + ".rl-orb-breathe{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;animation:rlOrbBreathe 4.2s ease-in-out infinite;transform-origin:center;}"
    + ".rl-orb-glow{position:absolute;inset:-32%;border-radius:50%;background:radial-gradient(circle, var(--rl-orb-a) 0%, var(--rl-orb-b) 42%, transparent 72%);filter:blur(var(--rl-orb-blur));opacity:.5;pointer-events:none;}"
    + ".rl-orb{position:relative;width:100%;height:100%;border-radius:50%;overflow:hidden;animation:rlOrbRotate 22s linear infinite;background:radial-gradient(circle at 30% 26%, rgba(255,255,255,.4), transparent 42%),radial-gradient(circle at 70% 74%, var(--rl-orb-b), transparent 58%),radial-gradient(circle at 28% 76%, var(--rl-orb-a), transparent 58%), var(--rl-orb-bg);box-shadow:inset 0 0 26px rgba(255,255,255,.14), 0 0 0 1px rgba(255,255,255,.1), 0 20px 50px -14px rgba(0,0,0,.6);}"
    + ".rl-orb-canvas{position:absolute;inset:0;width:100%;height:100%;}"
    + ".rl-orb-lines{position:absolute;inset:0;width:100%;height:100%;opacity:0;transition:opacity .35s ease;}"
    + ".rl-orb-lines circle,.rl-orb-lines path{fill:none;stroke:var(--rl-orb-b);stroke-width:.6;opacity:.85;vector-effect:non-scaling-stroke;filter:drop-shadow(0 0 3px var(--rl-orb-b));}"
    + ".rl-orb-wrap.is-hover .rl-orb-lines{opacity:1;}"
    + ".rl-orb-wave{position:absolute;inset:-12%;border-radius:50%;border:1.5px solid var(--rl-orb-b);opacity:0;pointer-events:none;}"
    + ".rl-orb-wrap.is-wave .rl-orb-wave{animation:rlOrbWave .75s ease-out;}"
    + "@keyframes rlOrbBreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}"
    + "@keyframes rlOrbRotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}"

     ========================================================== */
  function runBootSequence(onDone) {
    var bootEl = document.getElementById("rlBoot");
    if (!CONFIG.effects.bootSequence || !bootEl || reduceMotion) {
      onDone();
      return;
    }

    bootEl.classList.add("rl-boot--on");
    var textEl = document.getElementById("rlBootText");
    var percentEl = document.getElementById("rlBootPercent");
    var skipBtn = document.getElementById("rlBootSkip");
    var steps = CONFIG.boot.lines;
    var finished = false;

    function typeLine(str, cb) {
      textEl.textContent = "";
      var ci = 0;
      var iv = setInterval(function () {
        textEl.textContent += str[ci];
        ci++;
        if (ci >= str.length) {
          clearInterval(iv);
          setTimeout(cb, CONFIG.boot.holdMs);

      timers.push(iv);

    function runScan(cb) {
      bootEl.classList.add("rl-boot--scan");
      var start = Date.now();
      var dur = CONFIG.boot.scanMs;
      var iv = setInterval(function () {
        var p = Math.min(100, Math.round(((Date.now() - start) / dur) * 100));
        percentEl.textContent = p + "%";
        if (p >= 100) {
          clearInterval(iv);
          bootEl.classList.remove("rl-boot--scan");
          setTimeout(cb, 220);
        }
      }, 30);
      timers.push(iv);
    }

    var timers = [];

    function runStep(i) {
      if (finished) return;
      if (i >= steps.length) {
        finish();
        return;
      }
      var step = steps[i];
      typeLine(step.text, function () {
        if (step.mode === "scan") {
          runScan(function () { runStep(i + 1); });
        } else {
          if (i === steps.length - 1) bootEl.classList.add("rl-boot--success");
          setTimeout(function () { runStep(i + 1); }, 120);
        }
      });
    }

    function finish() {
      if (finished) return;
      finished = true;
      timers.forEach(function (t) { clearInterval(t); });
      bootEl.classList.add("rl-boot--flash");
      setTimeout(function () {
        bootEl.classList.add("rl-boot--out");
        onDone();
        setTimeout(function () {
          bootEl.style.display = "none";
        }, 750);
      }, 260);
    }

    skipBtn.addEventListener("click", finish);
    setTimeout(function () { runStep(0); }, CONFIG.boot.initialDelayMs);
  }

  /* ==========================================================
     WOW-ЕФЕКТ №2 — ЖИВЕ НЕЙРОННЕ ПОЛЕ ПІД КУРСОРОМ
     Мʼякий спотлайт навколо курсора + частки, що притягуються +
     нейронні звʼязки між ними та курсором.
     ========================================================== */
  function startNeuralField() {
    var canvas = document.getElementById("rlNeural");
    if (!CONFIG.effects.neuralCursor || !canvas || !canvas.getContext) return;

    var ctx = canvas.getContext("2d");
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var W = 0, H = 0;
    var particles = [];
    var pointer = { x: 0, y: 0, active: false };
    var isFinePointer = window.matchMedia && window.matchMedia("(pointer: fine)").matches;
    var running = true;

    var goldRGB = hexToRgb(CONFIG.colors.goldSoft);
    var mangoRGB = hexToRgb(CONFIG.colors.mango);

    function hexToRgb(hex) {
      hex = hex.replace("#", "");
      var n = parseInt(hex, 16);
      return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
    }

    function resize() {
      var rect = root.getBoundingClientRect();
      W = rect.width;
      H = rect.height;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      initParticles();
    }

    function initParticles() {
      var area = W * H;
      var count = Math.round((area / 22000) * CONFIG.neural.density);
      count = Math.max(16, Math.min(CONFIG.neural.maxParticles, count));
      particles = [];
      for (var i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 0.25,
          vy: (Math.random() - 0.5) * 0.25,
          r: 1.4 + Math.random() * 1.6
        });
      }
    }

    function onPointerMove(e) {
      var rect = root.getBoundingClientRect();
      pointer.x = e.clientX - rect.left;
      pointer.y = e.clientY - rect.top;
      pointer.active = pointer.x >= 0 && pointer.y >= 0 && pointer.x <= W && pointer.y <= H;
    }
    function onPointerLeave() { pointer.active = false; }

    function onTouchMove(e) {
      if (!e.touches || !e.touches.length) return;
      var t = e.touches[0];
      var rect = root.getBoundingClientRect();
      pointer.x = t.clientX - rect.left;
      pointer.y = t.clientY - rect.top;
      pointer.active = pointer.x >= 0 && pointer.y >= 0 && pointer.x <= W && pointer.y <= H;
    }
    function onTouchEnd() {
      // невелика затримка, щоб спотлайт плавно згасав, а не зникав миттєво
      setTimeout(function () { pointer.active = false; }, 250);
    }

    if (isFinePointer) {
      window.addEventListener("mousemove", onPointerMove, { passive: true });
      root.addEventListener("mouseleave", onPointerLeave, { passive: true });
    }
    // палець на екрані — той самий ефект, без блокування скролу (passive: true)
    root.addEventListener("touchmove", onTouchMove, { passive: true });
    root.addEventListener("touchend", onTouchEnd, { passive: true });
    root.addEventListener("touchcancel", onTouchEnd, { passive: true });

    var connectDist = CONFIG.neural.connectDistance;
    var pointerRadius = CONFIG.neural.pointerRadius;

    function frame() {
      if (!running) return;
      ctx.clearRect(0, 0, W, H);

      // мʼякий спотлайт навколо курсора
      if (pointer.active) {
        var grad = ctx.createRadialGradient(pointer.x, pointer.y, 0, pointer.x, pointer.y, pointerRadius);
        grad.addColorStop(0, "rgba(" + goldRGB.r + "," + goldRGB.g + "," + goldRGB.b + ",0.14)");
        grad.addColorStop(1, "rgba(" + goldRGB.r + "," + goldRGB.g + "," + goldRGB.b + ",0)");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(pointer.x, pointer.y, pointerRadius, 0, Math.PI * 2);
        ctx.fill();
      }

      // оновлення й притягання часток
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];

        if (pointer.active) {
          var dx = pointer.x - p.x, dy = pointer.y - p.y;
          var dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < pointerRadius && dist > 0.01) {
            var force = (1 - dist / pointerRadius) * 0.045;
            p.vx += (dx / dist) * force;
            p.vy += (dy / dist) * force;
          }
        }

        p.vx *= 0.965;
        p.vy *= 0.965;
        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0) { p.x = 0; p.vx *= -1; }
        if (p.x > W) { p.x = W; p.vx *= -1; }
        if (p.y < 0) { p.y = 0; p.vy *= -1; }
        if (p.y > H) { p.y = H; p.vy *= -1; }
      }

      // нейронні звʼязки між частками
      for (var a = 0; a < particles.length; a++) {
        for (var b = a + 1; b < particles.length; b++) {
          var pa = particles[a], pb = particles[b];
          var ddx = pa.x - pb.x, ddy = pa.y - pb.y;
          var d = Math.sqrt(ddx * ddx + ddy * ddy);
          if (d < connectDist) {
            var alpha = (1 - d / connectDist) * 0.35;
            ctx.strokeStyle = "rgba(" + goldRGB.r + "," + goldRGB.g + "," + goldRGB.b + "," + alpha + ")";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(pa.x, pa.y);
            ctx.lineTo(pb.x, pb.y);
            ctx.stroke();
          }
        }
        // звʼязок частки з курсором
        if (pointer.active) {
          var pdx = particles[a].x - pointer.x, pdy = particles[a].y - pointer.y;
          var pdist = Math.sqrt(pdx * pdx + pdy * pdy);
          if (pdist < pointerRadius) {
            var pAlpha = (1 - pdist / pointerRadius) * 0.55;
            ctx.strokeStyle = "rgba(" + mangoRGB.r + "," + mangoRGB.g + "," + mangoRGB.b + "," + pAlpha + ")";
            ctx.lineWidth = 1.1;
            ctx.beginPath();
            ctx.moveTo(particles[a].x, particles[a].y);
            ctx.lineTo(pointer.x, pointer.y);
            ctx.stroke();
          }
        }
      }

      // самі частки
      for (var k = 0; k < particles.length; k++) {
        var pt = particles[k];
        ctx.beginPath();
        ctx.fillStyle = "rgba(" + goldRGB.r + "," + goldRGB.g + "," + goldRGB.b + ",0.85)";
        ctx.shadowColor = "rgba(" + goldRGB.r + "," + goldRGB.g + "," + goldRGB.b + ",0.9)";
        ctx.shadowBlur = 6;
        ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.shadowBlur = 0;

      requestAnimationFrame(frame);
    }

    document.addEventListener("visibilitychange", function () {
      running = !document.hidden;
      if (running) requestAnimationFrame(frame);
    });

    var resizeTimer;
    window.addEventListener("resize", function () {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(resize, 150);
    });

    resize();
    if (!reduceMotion) {
      requestAnimationFrame(frame);
    } else {
      // за зменшеної анімації малюємо один статичний кадр без руху/притягання
      frame();
      running = false;
    }
  }

  /* ==========================================================
     WOW-ЕФЕКТ №3 — ПАРЮЧА AI-СФЕРА (замінює мокап телефону)
     Часточки всередині + подих (breathing) + повільне обертання.
     Hover (десктоп) / дотик (мобільний) — світні лінії.
     Клік / тап — хвиля світла. Легка реакція на скрол.
     ========================================================== */
  function startOrb() {
    var wrap = document.getElementById("rlOrb");
    if (!CONFIG.effects.orb || !wrap) return;
    setTimeout(function () { wrap.classList.add("rl-settled"); }, 950);

    var canvas = document.getElementById("rlOrbCanvas");
    var waveEl = document.getElementById("rlOrbWave");
    var ctx = canvas && canvas.getContext ? canvas.getContext("2d") : null;
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var size = 0;
    var dots = [];
    var colorA = hexToRgb(CONFIG.orb.colorA);
    var colorB = hexToRgb(CONFIG.orb.colorB);

    function hexToRgb(hex) {
      hex = hex.replace("#", "");
      var n = parseInt(hex, 16);
      return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
    }

    function resize() {
      var rect = wrap.getBoundingClientRect();
      size = rect.width;
      if (!ctx || !size) return;
      canvas.width = size * dpr;
      canvas.height = size * dpr;
      canvas.style.width = size + "px";
      canvas.style.height = size + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      if (!dots.length) initDots();
    }

    function initDots() {
      var n = CONFIG.orb.particles || 16;
      dots = [];
      for (var i = 0; i < n; i++) {
        var ang = Math.random() * Math.PI * 2;
        var rad = Math.random() * (size * 0.36);
        dots.push({
          a: ang,
          r: rad,
          speed: (Math.random() - 0.5) * 0.004,
          rr: 1 + Math.random() * 1.6,
          drift: Math.random() * Math.PI * 2
        });
      }
    }

    function frame() {
      if (!ctx || !size) { requestAnimationFrame(frame); return; }
      var cx = size / 2, cy = size / 2;
      ctx.clearRect(0, 0, size, size);
      for (var i = 0; i < dots.length; i++) {
        var d = dots[i];
        d.a += d.speed;
        d.drift += 0.01;
        var rr = d.r + Math.sin(d.drift) * 4;
        var x = cx + Math.cos(d.a) * rr;
        var y = cy + Math.sin(d.a) * rr * 0.9;
        var mix = (Math.sin(d.a) + 1) / 2;
        var col = {
          r: colorA.r + (colorB.r - colorA.r) * mix,
          g: colorA.g + (colorB.g - colorA.g) * mix,
          b: colorA.b + (colorB.b - colorA.b) * mix
        };
        ctx.beginPath();
        ctx.fillStyle = "rgba(" + (col.r | 0) + "," + (col.g | 0) + "," + (col.b | 0) + ",0.85)";
        ctx.shadowColor = "rgba(" + (col.r | 0) + "," + (col.g | 0) + "," + (col.b | 0) + ",0.9)";
        ctx.shadowBlur = 5;
        ctx.arc(x, y, d.rr, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.shadowBlur = 0;
      requestAnimationFrame(frame);
    }

    // hover (десктоп) — показуємо додаткові світні лінії
    wrap.addEventListener("mouseenter", function () { wrap.classList.add("is-hover"); });
    wrap.addEventListener("mouseleave", function () { wrap.classList.remove("is-hover"); });

    // клік / тап — коротка хвиля світла
    function triggerWave() {
      wrap.classList.remove("is-wave");
      void wrap.offsetWidth; // форсуємо reflow, щоб анімація перезапустилась
      wrap.classList.add("is-wave");
    }
    wrap.addEventListener("click", triggerWave);

    // дотик пальцем — імітуємо hover-лінії + одразу хвилю, як природний тап
    wrap.addEventListener("touchstart", function () {
      wrap.classList.add("is-hover");
      triggerWave();
    }, { passive: true });
    wrap.addEventListener("touchend", function () {
      setTimeout(function () { wrap.classList.remove("is-hover"); }, 350);
    }, { passive: true });

    // легка реакція на скрол — сфера трохи зміщується й тьмяніє,
    // коли герой виїжджає за межі екрана
    var scrollTicking = false;
    function onScroll() {
      if (scrollTicking || reduceMotion) return;
      scrollTicking = true;
      requestAnimationFrame(function () {
        var rect = root.getBoundingClientRect();
        var vh = window.innerHeight || 800;
        var progress = 1 - Math.min(1, Math.max(0, rect.top / vh));
        var shift = Math.min(24, progress * 24);
        wrap.style.setProperty("--rl-orb-scroll-shift", shift + "px");
        wrap.style.transform = "translateY(" + (-shift) + "px)";
        scrollTicking = false;
      });
    }
    window.addEventListener("scroll", onScroll, { passive: true });

    var resizeTimer2;
    window.addEventListener("resize", function () {
      clearTimeout(resizeTimer2);
      resizeTimer2 = setTimeout(resize, 150);
    });

    resize();
    if (!reduceMotion) requestAnimationFrame(frame);
  }

  // старт: спершу екран запуску AI (WOW-ефект №1), потім розкриття
  // контенту, живе нейронне поле (WOW-ефект №2) і AI-сфера (WOW-ефект №3)
  runBootSequence(function () {
    revealHero();
    startNeuralField();
    startOrb();
  });
})();
</script>
