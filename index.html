<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Reels Creator — контент, якого ще не існувало</title>
<meta name="description" content="AI Reels Creator створює Reels, рекламу та AI-візуали, яких ще не існувало. Дивись приклади в Instagram @new_ai_life.">
</head>
<body>

<!--
  ============================================================
  WOW-ЕФЕКТ №1 — "ЗАПУСК AI"
  Темний екран → блимає курсор → друкується текст →
  сканування користувача → інтерфейс збирається зі світла.
  Вимикається/налаштовується через CONFIG.effects.bootSequence
  та CONFIG.boot нижче. Якщо JS вимкнено — цей блок просто
  не показується (display:none за замовчуванням), і сторінка
  одразу видима — це не ламає SEO та доступність.
  ============================================================
-->
<div class="rl-boot" id="rlBoot" aria-hidden="true">
  <div class="rl-boot__grid"></div>
  <div class="rl-boot__scanline"></div>
  <div class="rl-boot__corners">
    <span class="c c-tl"></span><span class="c c-tr"></span><span class="c c-bl"></span><span class="c c-br"></span>
  </div>
  <div class="rl-boot__console">
    <span id="rlBootText"></span><span class="rl-boot__percent" id="rlBootPercent">0%</span><span class="rl-boot__cursor"></span>
  </div>
  <div class="rl-boot__flash"></div>
  <button type="button" class="rl-boot__skip" id="rlBootSkip">Пропустити ⌁</button>
</div>

<!--
  ============================================================
  AI REELS CREATOR — HERO-БЛОК, ВАРІАНТ 3: "СТУДІЯ НА СТОЛІ"
  Ідея: стіл арт-директора — приколоті знімки, і телефон, що
  програє справжній Reels з UI-накладкою Instagram.
  Реальне лого, реальні фото, реальне відео.
  Готово для GitHub Pages: index.html + /assets.
  Всі налаштування — в CONFIG нижче.
  ============================================================
-->
<section class="rl-hero" id="rlHero">

  <div class="rl-decor" aria-hidden="true">
    <div class="rl-glow rl-glow--1"></div>
    <div class="rl-glow rl-glow--2"></div>
    <svg class="rl-spark rl-spark--1" viewBox="0 0 24 24"><path d="M12 0 L14 10 L24 12 L14 14 L12 24 L10 14 L0 12 L10 10 Z"/></svg>
    <svg class="rl-spark rl-spark--2" viewBox="0 0 24 24"><path d="M12 0 L14 10 L24 12 L14 14 L12 24 L10 14 L0 12 L10 10 Z"/></svg>
  </div>

  <!-- WOW-ЕФЕКТ №2: живе нейронне поле, що реагує на курсор — canvas-шар позаду контенту -->
  <canvas class="rl-neural" id="rlNeural" aria-hidden="true"></canvas>

  <div class="rl-inner">

    <div class="rl-content">
      <div class="rl-brand rl-reveal">
        <img id="rlLogo" class="rl-brand__logo" src="" alt="" />
        <span class="rl-brand__name">AI Reels Creator</span>
      </div>

      <p class="rl-eyebrow rl-reveal" id="rlEyebrow"></p>

      <span id="rlHeadingSlot"></span>

      <p class="rl-sub rl-reveal" id="rlSub"></p>

      <div class="rl-cta rl-reveal" id="rlButtons"></div>

      <div class="rl-handle rl-reveal" id="rlHandle"></div>
    </div>

    <div class="rl-visual">
      <div class="rl-cluster">

        <figure class="rl-tape rl-tape--a rl-reveal" id="rlPhotoA">
          <img alt="" />
        </figure>

        <figure class="rl-tape rl-tape--b rl-reveal" id="rlPhotoB">
          <img alt="" />
        </figure>

        <div class="rl-phone rl-reveal">
          <div class="rl-phone__notch"></div>
          <video class="rl-phone__video" id="rlVideo" muted loop autoplay playsinline></video>
          <div class="rl-phone__ui">
            <div class="rl-phone__rail">
              <span class="rl-icon">♥</span>
              <span class="rl-icon">💬</span>
              <span class="rl-icon">↗</span>
            </div>
            <div class="rl-phone__caption">
              <strong id="rlCapHandle"></strong>
              <span id="rlCapText"></span>
            </div>
          </div>
        </div>

        <figure class="rl-tape rl-tape--c rl-reveal" id="rlPhotoC">
          <img alt="" />
        </figure>

      </div>
    </div>

  </div>
</section>

<script>
(function () {
  /* ==========================================================
     CONFIG — ВСІ НАЛАШТУВАННЯ БЛОКУ
     ========================================================== */
  var CONFIG = {

    /* h1 — якщо блок ПЕРШИЙ на сторінці, h2 — якщо ні */
    headingLevel: "h1", /* ЗМІНИТИ на "h2", якщо блок не перший на сторінці */

    /* --- Кольори --- */
    colors: {
      bg:        "#1E1622", /* ЗМІНИТИ — фон секції (глибокий сливовий) */
      bg2:       "#140E17", /* ЗМІНИТИ — другий тон фону для градієнта */
      cream:     "#F6EEE0", /* ЗМІНИТИ — основний світлий текст */
      gold:      "#C9A24B", /* ЗМІНИТИ — акцент (бронза/золото) */
      goldSoft:  "#E4C878", /* ЗМІНИТИ — світліший відтінок золота (курсив у заголовку) */
      mango:     "#E8792B", /* ЗМІНИТИ — акцент дії (кнопка, іскри) */
      ink:       "#0E0A10", /* ЗМІНИТИ — майже чорний, для рамки телефону */
      btnPrimaryText: "#1E1622", /* ЗМІНИТИ — колір тексту основної кнопки (!important) */
      btnOutlineText: "#F6EEE0"  /* ЗМІНИТИ — колір тексту другої кнопки (!important) */
    },

    /* --- Шрифти (Google Fonts) --- */
    fontHeading: "Fraunces", /* ЗМІНИТИ — редакційний serif для заголовка */
    fontBody: "Sora", /* ЗМІНИТИ — шрифт тексту й кнопок */
    fontHeadingUrl: "@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&display=swap');", /* ЗМІНИТИ */
    fontBodyUrl: "@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap');", /* ЗМІНИТИ */

    /* --- Лого --- */
    logo: {
      src: "logo.jpg", /* ЗМІНИТИ шлях, якщо перенесете файл */
      alt: "Лого AI Reels Creator — тукан у вигляді ананаса з хлопавкою оператора"
    },

    /* --- Тексти --- */
    eyebrow: "AI CONTENT STUDIO · REELS · ADS · VISUALS",
    headingLine1: "Кадри, яких ще",
    headingLine2: "ніхто не знімав", /* виділяється курсивом золотого кольору */
    subheading: "AI Reels Creator створює образи, ролики та рекламні кадри, яких раніше просто не існувало. Жодної камери, жодної студії — тільки ідея і штучний інтелект, що знає, як зробити так, щоб на це дивились.",
    handle: "@new_ai_life",
    handleCaption: "нові кадри щотижня — дивись у Reels",

    /* --- Кнопки --- */
    buttons: [
      {
        text: "Переглянути Reels в Instagram", /* ЗМІНИТИ */
        url: "https://www.instagram.com/new_ai_life?utm_source=ig_web_button_share_sheet", /* ЗМІНИТИ */
        style: "primary"
      },
      {
        text: "Обговорити свій проєкт", /* ЗМІНИТИ */
        url: "https://ig.me/m/new_ai_life", /* ЗМІНИТИ */
        style: "outline"
      }
    ],

    /* --- Приколоті фото навколо телефону --- */
    photos: {
      a: { src: "assets/photo1.webp", alt: "AI-згенерований образ від AI Reels Creator — стильний портрет" },
      b: { src: "assets/photo2.webp", alt: "AI-згенерований кадр для Reels — редакційний стиль" },
      c: { src: "assets/photo3.webp", alt: "AI-візуал для реклами, створений AI Reels Creator" }
    },

    /* --- Відео в мокапі телефону --- */
    video: {
      src: "assets/reel.mp4",
      poster: "assets/poster.webp"
    },

    /* --- Підпис усередині мокапу телефону (як у справжньому Reels) --- */
    phoneCaption: "AI reel · без зйомки, без студії ✨",

    /* --- WOW-ефекти --- */
    effects: {
      bootSequence: true, /* ЗМІНИТИ на false, щоб вимкнути екран запуску AI */
      neuralCursor: true  /* ЗМІНИТИ на false, щоб вимкнути живе нейронне поле під курсором */
    },

    /* --- Налаштування екрана запуску AI (WOW-ефект №1) --- */
    boot: {
      lines: [
        { text: "Initializing AI...", mode: "type" }, /* ЗМІНИТИ */
        { text: "Сканування відвідувача...", mode: "scan" }, /* ЗМІНИТИ */
        { text: "Профіль розпізнано — AI Reels Creator ✓", mode: "type" } /* ЗМІНИТИ */
      ],
      typeSpeedMs: 34, /* ЗМІНИТИ швидкість друку (мс на символ) */
      holdMs: 380,     /* ЗМІНИТИ паузу після кожного рядка */
      scanMs: 900,     /* ЗМІНИТИ тривалість сканування/лічильника % */
      initialDelayMs: 550 /* ЗМІНИТИ паузу з самотнім блимаючим курсором на старті */
    },

    /* --- Налаштування нейронного поля курсора (WOW-ефект №2) --- */
    neural: {
      density: 1,            /* ЗМІНИТИ (0.5–2) — щільність часток відносно площі блоку */
      connectDistance: 118,  /* ЗМІНИТИ — на якій відстані частки зʼєднуються лініями (px) */
      pointerRadius: 190,    /* ЗМІНИТИ — радіус "спотлайту" й притягання навколо курсора (px) */
      maxParticles: 70       /* ЗМІНИТИ — верхня межа кількості часток (для продуктивності) */
    }
  };

  /* ==========================================================
     СТИЛІ
     ========================================================== */
  var css = ""
    + CONFIG.fontHeadingUrl + "\n"
    + CONFIG.fontBodyUrl + "\n"
    + "#rlHero{"
    +   "--rl-bg:" + CONFIG.colors.bg + ";"
    +   "--rl-bg2:" + CONFIG.colors.bg2 + ";"
    +   "--rl-cream:" + CONFIG.colors.cream + ";"
    +   "--rl-gold:" + CONFIG.colors.gold + ";"
    +   "--rl-gold-soft:" + CONFIG.colors.goldSoft + ";"
    +   "--rl-mango:" + CONFIG.colors.mango + ";"
    +   "--rl-ink:" + CONFIG.colors.ink + ";"
    +   "--rl-btn-primary-text:" + CONFIG.colors.btnPrimaryText + ";"
    +   "--rl-btn-outline-text:" + CONFIG.colors.btnOutlineText + ";"
    +   "--rl-font-heading:'" + CONFIG.fontHeading + "', serif;"
    +   "--rl-font-body:'" + CONFIG.fontBody + "', sans-serif;"
    + "}"
    + "\n*{box-sizing:border-box;}"
    + "body{margin:0;}"
    + ".rl-hero{position:relative;overflow:hidden;background:radial-gradient(120% 130% at 78% 8%, var(--rl-bg2) 0%, var(--rl-bg) 60%);padding:120px 32px;font-family:var(--rl-font-body);isolation:isolate;}"
    + ".rl-inner{position:relative;z-index:3;max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1.08fr 0.92fr;gap:70px;align-items:center;}"
    + "@media(max-width:960px){.rl-inner{grid-template-columns:1fr;gap:88px;}.rl-hero{padding:80px 22px 100px;}}"

    /* декор */
    + ".rl-decor{position:absolute;inset:0;z-index:1;pointer-events:none;}"
    + ".rl-glow{position:absolute;border-radius:50%;filter:blur(70px);}"
    + ".rl-glow--1{width:520px;height:520px;background:var(--rl-mango);opacity:.16;top:-180px;right:-120px;}"
    + ".rl-glow--2{width:460px;height:460px;background:var(--rl-gold);opacity:.12;bottom:-200px;left:-140px;}"
    + ".rl-spark{position:absolute;width:16px;height:16px;fill:var(--rl-gold-soft);opacity:.7;animation:rlTwinkle 3.6s ease-in-out infinite;}"
    + ".rl-spark--1{top:10%;left:44%;animation-delay:.4s;}"
    + ".rl-spark--2{bottom:14%;right:6%;width:12px;height:12px;animation-delay:1.6s;}"
    + "@keyframes rlTwinkle{0%,100%{opacity:.25;transform:scale(.75)}50%{opacity:.9;transform:scale(1.05)}}"

    /* бренд */
    + ".rl-brand{display:flex;align-items:center;gap:12px;margin-bottom:30px;}"
    + ".rl-brand__logo{width:40px;height:40px;border-radius:10px;object-fit:cover;box-shadow:0 6px 18px rgba(0,0,0,.4);}"
    + ".rl-brand__name{font-family:var(--rl-font-body);font-weight:600;font-size:14px;letter-spacing:.04em;color:var(--rl-cream);opacity:.85;}"

    /* eyebrow */
    + ".rl-eyebrow{display:inline-block;margin:0 0 22px;padding:0;font-family:var(--rl-font-body);font-weight:600;font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--rl-gold-soft);}"

    /* заголовок */
    + ".rl-heading{font-family:var(--rl-font-heading);font-weight:400;color:var(--rl-cream);font-size:64px;line-height:1.08;letter-spacing:-.01em;margin:0 0 26px;}"
    + ".rl-heading em{font-style:italic;font-weight:500;color:var(--rl-gold-soft);}"
    + "@media(max-width:960px){.rl-heading{font-size:46px;}}"
    + "@media(max-width:480px){.rl-heading{font-size:36px;}}"

    /* підзаголовок */
    + ".rl-sub{font-size:17.5px;line-height:1.7;color:var(--rl-cream);opacity:.68;max-width:470px;margin:0 0 36px;font-weight:400;}"

    /* кнопки */
    + ".rl-cta{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:26px;}"
    + ".rl-btn{display:inline-flex;align-items:center;justify-content:center;padding:16px 27px;border-radius:999px;font-family:var(--rl-font-body);font-weight:600;font-size:14.5px;text-decoration:none !important;transition:transform .18s ease, box-shadow .18s ease, background .18s ease, border-color .18s ease;border:1.5px solid transparent;cursor:pointer;}"
    + ".rl-btn:focus-visible{outline:3px solid var(--rl-gold-soft);outline-offset:3px;}"
    + ".rl-btn--primary{background:var(--rl-mango);color:var(--rl-btn-primary-text) !important;box-shadow:0 14px 28px -12px rgba(232,121,43,.7);}"
    + ".rl-btn--primary:hover{transform:translateY(-2px);box-shadow:0 18px 32px -12px rgba(232,121,43,.8);}"
    + ".rl-btn--outline{background:transparent;border-color:rgba(246,238,224,.35);color:var(--rl-btn-outline-text) !important;}"
    + ".rl-btn--outline:hover{border-color:var(--rl-cream);background:rgba(246,238,224,.06);transform:translateY(-2px);}"

    /* хендл */
    + ".rl-handle{display:flex;align-items:baseline;gap:8px;font-size:13.5px;color:var(--rl-cream);opacity:.55;}"
    + ".rl-handle strong{color:var(--rl-gold-soft);opacity:1;font-weight:600;}"

    /* --- візуальний кластер --- */
    + ".rl-visual{position:relative;justify-self:center;width:100%;display:flex;justify-content:center;}"
    + ".rl-cluster{position:relative;width:420px;max-width:100%;height:560px;}"
    + "@media(max-width:480px){.rl-cluster{height:500px;}}"

    /* приколоті фото */
    + ".rl-tape{position:absolute;margin:0;padding:8px 8px 22px;background:var(--rl-cream);border-radius:2px;box-shadow:0 20px 40px -16px rgba(0,0,0,.55);}"
    + ".rl-tape img{display:block;width:100%;height:100%;object-fit:cover;border-radius:1px;}"
    + ".rl-tape::before{content:'';position:absolute;top:-10px;left:50%;transform:translateX(-50%) rotate(-3deg);width:56px;height:20px;background:rgba(228,200,120,.55);box-shadow:0 2px 6px rgba(0,0,0,.2);}"
    + ".rl-tape--a{width:168px;height:198px;top:0;left:-6px;transform:rotate(-9deg);z-index:2;animation:rlFloat 6s ease-in-out infinite;}"
    + ".rl-tape--b{width:150px;height:180px;bottom:18px;left:6px;transform:rotate(7deg);z-index:2;animation:rlFloat 7s ease-in-out infinite 1s;}"
    + ".rl-tape--c{width:132px;height:160px;top:26px;right:-10px;transform:rotate(10deg);z-index:4;animation:rlFloat 6.5s ease-in-out infinite .5s;}"
    + "@keyframes rlFloat{0%,100%{transform:translateY(0) rotate(var(--r,0deg))}50%{transform:translateY(-9px) rotate(var(--r,0deg))}}"
    + ".rl-tape--a{--r:-9deg;} .rl-tape--b{--r:7deg;} .rl-tape--c{--r:10deg;}"

    /* телефон-мокап */
    + ".rl-phone{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:236px;height:498px;background:var(--rl-ink);border-radius:34px;padding:10px;box-shadow:0 0 0 2px rgba(246,238,224,.08), 0 40px 80px -20px rgba(0,0,0,.75);z-index:3;}"
    + ".rl-phone__notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:64px;height:18px;background:var(--rl-ink);border-radius:0 0 14px 14px;z-index:5;}"
    + ".rl-phone__video{width:100%;height:100%;object-fit:cover;border-radius:26px;display:block;background:var(--rl-bg2);}"
    + ".rl-phone__ui{position:absolute;inset:10px;border-radius:26px;display:flex;flex-direction:column;justify-content:space-between;padding:20px 12px;pointer-events:none;background:linear-gradient(180deg, rgba(0,0,0,.15) 0%, transparent 22%, transparent 68%, rgba(0,0,0,.55) 100%);}"
    + ".rl-phone__rail{align-self:flex-end;display:flex;flex-direction:column;gap:16px;margin-top:auto;margin-bottom:14px;}"
    + ".rl-icon{font-size:19px;color:var(--rl-cream);text-align:center;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));}"
    + ".rl-phone__caption{display:flex;flex-direction:column;gap:3px;color:var(--rl-cream);}"
    + ".rl-phone__caption strong{font-size:12.5px;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.6);}"
    + ".rl-phone__caption span{font-size:11px;opacity:.9;text-shadow:0 1px 3px rgba(0,0,0,.6);}"

    + "@media(max-width:480px){.rl-phone{width:200px;height:422px;}.rl-tape--a{width:140px;height:166px;}.rl-tape--b{width:126px;height:150px;}.rl-tape--c{width:112px;height:136px;}}"

    /* --- нейронний canvas-шар (WOW-ефект №2) --- */
    + ".rl-neural{position:absolute;inset:0;z-index:2;width:100%;height:100%;pointer-events:none;}"

    /* --- поява контенту "зі світла" (звʼязано з WOW-ефектом №1) --- */
    + "#rlHero.rl-js .rl-reveal{opacity:0;transform:translateY(18px) scale(.98);filter:blur(7px);transition:opacity .85s cubic-bezier(.19,.74,.24,1), transform .85s cubic-bezier(.19,.74,.24,1), filter .85s ease;}"
    + "#rlHero.rl-js.rl-live .rl-reveal{opacity:1;transform:none;filter:blur(0);}"

    + "@media(prefers-reduced-motion:reduce){.rl-tape,.rl-spark{animation:none !important;}#rlHero.rl-js .rl-reveal{transition:opacity .3s ease !important;transform:none !important;filter:none !important;}}"
    ;

  /* ==========================================================
     СТИЛІ WOW-ЕФЕКТУ №1 — екран запуску AI (окремий, фіксований
     поверх усієї сторінки, тому стилі не прив'язані до #rlHero)
     ========================================================== */
  var bootCss = ""
    + ".rl-boot{position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;background:radial-gradient(120% 130% at 50% 50%, #1B1420 0%, #0B0710 70%);overflow:hidden;transition:opacity .7s ease;font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;}"
    + ".rl-boot.rl-boot--on{display:flex;}"
    + ".rl-boot--out{opacity:0;pointer-events:none;}"
    + ".rl-boot__grid{position:absolute;inset:-2px;opacity:.14;background-image:linear-gradient(" + CONFIG.colors.gold + " 1px, transparent 1px),linear-gradient(90deg," + CONFIG.colors.gold + " 1px, transparent 1px);background-size:44px 44px;-webkit-mask-image:radial-gradient(circle at 50% 50%, #000 0%, transparent 72%);mask-image:radial-gradient(circle at 50% 50%, #000 0%, transparent 72%);}"
    + ".rl-boot__scanline{position:absolute;left:0;right:0;height:2px;top:-6%;background:linear-gradient(90deg, transparent, " + CONFIG.colors.goldSoft + ", transparent);box-shadow:0 0 18px 3px " + CONFIG.colors.goldSoft + ";opacity:0;}"
    + ".rl-boot.rl-boot--scan .rl-boot__scanline{opacity:1;animation:rlScan .95s linear infinite;}"
    + "@keyframes rlScan{from{top:-6%}to{top:106%}}"
    + ".rl-boot__corners{position:absolute;width:230px;height:230px;top:50%;left:50%;transform:translate(-50%,-58%);opacity:0;transition:opacity .35s ease;}"
    + ".rl-boot.rl-boot--scan .rl-boot__corners{opacity:.85;}"
    + ".rl-boot__corners .c{position:absolute;width:30px;height:30px;border:2px solid " + CONFIG.colors.goldSoft + ";}"
    + ".rl-boot__corners .c-tl{top:0;left:0;border-right:none;border-bottom:none;}"
    + ".rl-boot__corners .c-tr{top:0;right:0;border-left:none;border-bottom:none;}"
    + ".rl-boot__corners .c-bl{bottom:0;left:0;border-right:none;border-top:none;}"
    + ".rl-boot__corners .c-br{bottom:0;right:0;border-left:none;border-top:none;}"
    + ".rl-boot__console{position:relative;z-index:2;margin-top:70px;color:" + CONFIG.colors.cream + ";font-size:16px;letter-spacing:.02em;display:flex;align-items:center;min-height:22px;padding:0 24px;text-align:center;}"
    + ".rl-boot.rl-boot--success .rl-boot__console{color:" + CONFIG.colors.goldSoft + ";}"
    + ".rl-boot__percent{display:none;margin-left:10px;color:" + CONFIG.colors.goldSoft + ";font-weight:600;}"
    + ".rl-boot.rl-boot--scan .rl-boot__percent{display:inline;}"
    + ".rl-boot__cursor{display:inline-block;width:8px;height:17px;margin-left:3px;background:" + CONFIG.colors.goldSoft + ";animation:rlBlink 1s steps(1) infinite;}"
    + "@keyframes rlBlink{0%,49%{opacity:1}50%,100%{opacity:0}}"
    + ".rl-boot__flash{position:absolute;top:50%;left:50%;width:36px;height:36px;border-radius:50%;background:radial-gradient(circle,#fff 0%," + CONFIG.colors.goldSoft + " 35%, transparent 70%);transform:translate(-50%,-50%) scale(0);opacity:0;pointer-events:none;}"
    + ".rl-boot.rl-boot--flash .rl-boot__flash{animation:rlFlash .6s ease-out forwards;}"
    + "@keyframes rlFlash{0%{transform:translate(-50%,-50%) scale(0);opacity:0}30%{opacity:1}100%{transform:translate(-50%,-50%) scale(42);opacity:0}}"
    + ".rl-boot__skip{position:absolute;bottom:26px;right:26px;z-index:3;background:transparent;border:1px solid rgba(246,238,224,.25);color:" + CONFIG.colors.cream + ";opacity:0;font-family:var(--rl-font-body,inherit);font-size:12px;letter-spacing:.04em;padding:8px 14px;border-radius:999px;cursor:pointer;transition:opacity .3s ease .6s, border-color .2s ease;}"
    + ".rl-boot.rl-boot--on .rl-boot__skip{opacity:.55;}"
    + ".rl-boot__skip:hover{opacity:1 !important;border-color:rgba(246,238,224,.5);}"
    + "@media(max-width:480px){.rl-boot__console{font-size:14px;}.rl-boot__corners{width:180px;height:180px;}}"
    + "@media(prefers-reduced-motion:reduce){.rl-boot__scanline,.rl-boot__flash,.rl-boot__cursor{animation:none !important;}}"
    ;

  var bootStyleTag = document.createElement("style");
  bootStyleTag.setAttribute("data-rl-boot", "");
  bootStyleTag.textContent = bootCss;
  document.head.appendChild(bootStyleTag);

  var styleTag = document.createElement("style");
  styleTag.setAttribute("data-rl-hero", "");
  styleTag.textContent = css;
  document.head.appendChild(styleTag);

  /* ==========================================================
     РОЗМІТКА — заповнюється з CONFIG
     ========================================================== */
  var root = document.getElementById("rlHero");
  if (!root) return;

  var logoEl = document.getElementById("rlLogo");
  logoEl.src = CONFIG.logo.src;
  logoEl.alt = CONFIG.logo.alt;

  document.getElementById("rlEyebrow").textContent = CONFIG.eyebrow;

  // заголовок: h1/h2 з CONFIG, другий рядок — курсивом золотого кольору
  var headingTag = (CONFIG.headingLevel === "h2") ? "h2" : "h1";
  var headingEl = document.createElement(headingTag);
  headingEl.className = "rl-heading";
  headingEl.innerHTML = CONFIG.headingLine1 + "<br><em>" + CONFIG.headingLine2 + "</em>";
  document.getElementById("rlHeadingSlot").replaceWith(headingEl);

  document.getElementById("rlSub").textContent = CONFIG.subheading;

  document.getElementById("rlCapHandle").textContent = CONFIG.handle;
  document.getElementById("rlHandle").innerHTML =
    "<strong>" + CONFIG.handle + "</strong><span>" + CONFIG.handleCaption + "</span>";

  var btnWrap = document.getElementById("rlButtons");
  CONFIG.buttons.forEach(function (btn) {
    var a = document.createElement("a");
    a.href = btn.url;
    a.target = "_blank";
    a.rel = "noopener";
    a.className = "rl-btn " + (btn.style === "outline" ? "rl-btn--outline" : "rl-btn--primary");
    a.textContent = btn.text;
    btnWrap.appendChild(a);
  });

  // приколоті фото
  ["a", "b", "c"].forEach(function (key) {
    var wrap = document.getElementById("rlPhoto" + key.toUpperCase());
    var img = wrap.querySelector("img");
    img.src = CONFIG.photos[key].src;
    img.alt = CONFIG.photos[key].alt;
    img.loading = "lazy";
  });

  // відео у мокапі телефону
  var video = document.getElementById("rlVideo");
  video.src = CONFIG.video.src;
  video.poster = CONFIG.video.poster;

  // підпис у Reels-інтерфейсі
  document.getElementById("rlCapText").textContent = CONFIG.phoneCaption;

  var reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* ==========================================================
     WOW-ЕФЕКТ №1 — ЕКРАН ЗАПУСКУ AI
     Темний екран → блимає курсор → друкується текст →
     сканування → інтерфейс "збирається зі світла".
     ========================================================== */
  function runBootSequence(onDone) {
    var bootEl = document.getElementById("rlBoot");
    if (!CONFIG.effects.bootSequence || !bootEl || reduceMotion) {
      onDone();
      return;
    }

    bootEl.classList.add("rl-boot--on");
    var textEl = document.getElementById("rlBootText");
    var percentEl = document.getElementById("rlBootPercent");
    var skipBtn = document.getElementById("rlBootSkip");
    var steps = CONFIG.boot.lines;
    var finished = false;

    function typeLine(str, cb) {
      textEl.textContent = "";
      var ci = 0;
      var iv = setInterval(function () {
        textEl.textContent += str[ci];
        ci++;
        if (ci >= str.length) {
          clearInterval(iv);
          setTimeout(cb, CONFIG.boot.holdMs);
        }
      }, CONFIG.boot.typeSpeedMs);
      timers.push(iv);
    }

    function runScan(cb) {
      bootEl.classList.add("rl-boot--scan");
      var start = Date.now();
      var dur = CONFIG.boot.scanMs;
      var iv = setInterval(function () {
        var p = Math.min(100, Math.round(((Date.now() - start) / dur) * 100));
        percentEl.textContent = p + "%";
        if (p >= 100) {
          clearInterval(iv);
          bootEl.classList.remove("rl-boot--scan");
          setTimeout(cb, 220);
        }
      }, 30);
      timers.push(iv);
    }

    var timers = [];

    function runStep(i) {
      if (finished) return;
      if (i >= steps.length) {
        finish();
        return;
      }
      var step = steps[i];
      typeLine(step.text, function () {
        if (step.mode === "scan") {
          runScan(function () { runStep(i + 1); });
        } else {
          if (i === steps.length - 1) bootEl.classList.add("rl-boot--success");
          setTimeout(function () { runStep(i + 1); }, 120);
        }
      });
    }

    function finish() {
      if (finished) return;
      finished = true;
      timers.forEach(function (t) { clearInterval(t); });
      bootEl.classList.add("rl-boot--flash");
      setTimeout(function () {
        bootEl.classList.add("rl-boot--out");
        onDone();
        setTimeout(function () {
          bootEl.style.display = "none";
        }, 750);
      }, 260);
    }

    skipBtn.addEventListener("click", finish);
    setTimeout(function () { runStep(0); }, CONFIG.boot.initialDelayMs);
  }

  /* поява контенту "зі світла" після завершення екрана запуску */
  function revealHero() {
    root.classList.add("rl-js");
    var items = root.querySelectorAll(".rl-reveal");
    items.forEach(function (el, i) {
      el.style.transitionDelay = reduceMotion ? "0ms" : (i * 60) + "ms";
    });
    // невелика затримка перед додаванням rl-js гарантує, що браузер
    // встигне застосувати початковий (прихований) стан перед переходом
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        root.classList.add("rl-live");
      });
    });
  }

  /* ==========================================================
     WOW-ЕФЕКТ №2 — ЖИВЕ НЕЙРОННЕ ПОЛЕ ПІД КУРСОРОМ
     Мʼякий спотлайт навколо курсора + частки, що притягуються +
     нейронні звʼязки між ними та курсором.
     ========================================================== */
  function startNeuralField() {
    var canvas = document.getElementById("rlNeural");
    if (!CONFIG.effects.neuralCursor || !canvas || !canvas.getContext) return;

    var ctx = canvas.getContext("2d");
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var W = 0, H = 0;
    var particles = [];
    var pointer = { x: 0, y: 0, active: false };
    var isFinePointer = window.matchMedia && window.matchMedia("(pointer: fine)").matches;
    var running = true;

    var goldRGB = hexToRgb(CONFIG.colors.goldSoft);
    var mangoRGB = hexToRgb(CONFIG.colors.mango);

    function hexToRgb(hex) {
      hex = hex.replace("#", "");
      var n = parseInt(hex, 16);
      return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
    }

    function resize() {
      var rect = root.getBoundingClientRect();
      W = rect.width;
      H = rect.height;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      initParticles();
    }

    function initParticles() {
      var area = W * H;
      var count = Math.round((area / 22000) * CONFIG.neural.density);
      count = Math.max(16, Math.min(CONFIG.neural.maxParticles, count));
      particles = [];
      for (var i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 0.25,
          vy: (Math.random() - 0.5) * 0.25,
          r: 1.4 + Math.random() * 1.6
        });
      }
    }

    function onPointerMove(e) {
      var rect = root.getBoundingClientRect();
      pointer.x = e.clientX - rect.left;
      pointer.y = e.clientY - rect.top;
      pointer.active = pointer.x >= 0 && pointer.y >= 0 && pointer.x <= W && pointer.y <= H;
    }
    function onPointerLeave() { pointer.active = false; }

    if (isFinePointer) {
      window.addEventListener("mousemove", onPointerMove, { passive: true });
      root.addEventListener("mouseleave", onPointerLeave, { passive: true });
    }

    var connectDist = CONFIG.neural.connectDistance;
    var pointerRadius = CONFIG.neural.pointerRadius;

    function frame() {
      if (!running) return;
      ctx.clearRect(0, 0, W, H);

      // мʼякий спотлайт навколо курсора
      if (pointer.active) {
        var grad = ctx.createRadialGradient(pointer.x, pointer.y, 0, pointer.x, pointer.y, pointerRadius);
        grad.addColorStop(0, "rgba(" + goldRGB.r + "," + goldRGB.g + "," + goldRGB.b + ",0.14)");
        grad.addColorStop(1, "rgba(" + goldRGB.r + "," + goldRGB.g + "," + goldRGB.b + ",0)");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(pointer.x, pointer.y, pointerRadius, 0, Math.PI * 2);
        ctx.fill();
      }

      // оновлення й притягання часток
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];

        if (pointer.active) {
          var dx = pointer.x - p.x, dy = pointer.y - p.y;
          var dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < pointerRadius && dist > 0.01) {
            var force = (1 - dist / pointerRadius) * 0.045;
            p.vx += (dx / dist) * force;
            p.vy += (dy / dist) * force;
          }
        }

        p.vx *= 0.965;
        p.vy *= 0.965;
        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0) { p.x = 0; p.vx *= -1; }
        if (p.x > W) { p.x = W; p.vx *= -1; }
        if (p.y < 0) { p.y = 0; p.vy *= -1; }
        if (p.y > H) { p.y = H; p.vy *= -1; }
      }

      // нейронні звʼязки між частками
      for (var a = 0; a < particles.length; a++) {
        for (var b = a + 1; b < particles.length; b++) {
          var pa = particles[a], pb = particles[b];
          var ddx = pa.x - pb.x, ddy = pa.y - pb.y;
          var d = Math.sqrt(ddx * ddx + ddy * ddy);
          if (d < connectDist) {
            var alpha = (1 - d / connectDist) * 0.35;
            ctx.strokeStyle = "rgba(" + goldRGB.r + "," + goldRGB.g + "," + goldRGB.b + "," + alpha + ")";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(pa.x, pa.y);
            ctx.lineTo(pb.x, pb.y);
            ctx.stroke();
          }
        }
        // звʼязок частки з курсором
        if (pointer.active) {
          var pdx = particles[a].x - pointer.x, pdy = particles[a].y - pointer.y;
          var pdist = Math.sqrt(pdx * pdx + pdy * pdy);
          if (pdist < pointerRadius) {
            var pAlpha = (1 - pdist / pointerRadius) * 0.55;
            ctx.strokeStyle = "rgba(" + mangoRGB.r + "," + mangoRGB.g + "," + mangoRGB.b + "," + pAlpha + ")";
            ctx.lineWidth = 1.1;
            ctx.beginPath();
            ctx.moveTo(particles[a].x, particles[a].y);
            ctx.lineTo(pointer.x, pointer.y);
            ctx.stroke();
          }
        }
      }

      // самі частки
      for (var k = 0; k < particles.length; k++) {
        var pt = particles[k];
        ctx.beginPath();
        ctx.fillStyle = "rgba(" + goldRGB.r + "," + goldRGB.g + "," + goldRGB.b + ",0.85)";
        ctx.shadowColor = "rgba(" + goldRGB.r + "," + goldRGB.g + "," + goldRGB.b + ",0.9)";
        ctx.shadowBlur = 6;
        ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.shadowBlur = 0;

      requestAnimationFrame(frame);
    }

    document.addEventListener("visibilitychange", function () {
      running = !document.hidden;
      if (running) requestAnimationFrame(frame);
    });

    var resizeTimer;
    window.addEventListener("resize", function () {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(resize, 150);
    });

    resize();
    if (!reduceMotion) {
      requestAnimationFrame(frame);
    } else {
      // за зменшеної анімації малюємо один статичний кадр без руху/притягання
      frame();
      running = false;
    }
  }

  // старт: спершу екран запуску AI (WOW-ефект №1), потім розкриття
  // контенту і живе нейронне поле (WOW-ефект №2)
  runBootSequence(function () {
    revealHero();
    startNeuralField();
  });
})();
</script>

</body>
</html>
