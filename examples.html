<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приклади сайтів — AI Reels Creator</title>
<meta name="description" content="Реальні сайти, створені для клієнтів AI Reels Creator.">
</head>
<body>

<section class="ex-page" id="exPage">
  <div class="ex-decor" aria-hidden="true">
    <div class="ex-glow ex-glow--1"></div>
    <div class="ex-glow ex-glow--2"></div>
  </div>

  <div class="ex-inner">
    <a class="ex-back" id="exBack" href="index.html">← На головну</a>

    <p class="ex-eyebrow" id="exEyebrow"></p>
    <h1 class="ex-title" id="exTitle"></h1>
    <p class="ex-sub" id="exSub"></p>

    <div class="ex-grid" id="exGrid"></div>

    <div class="ex-cta">
      <p class="ex-cta__text" id="exCtaText"></p>
      <a class="ex-cta__btn" id="exCtaBtn" target="_blank" rel="noopener"></a>
    </div>
  </div>
</section>

<script>
(function () {
  /* ==========================================================
     CONFIG -- ВСІ НАЛАШТУВАННЯ СТОРІНКИ
     ========================================================== */
  var CONFIG = {

    colors: {
      bg:        "#1E1622",
      bg2:       "#140E17",
      cream:     "#F6EEE0",
      gold:      "#C9A24B",
      goldSoft:  "#E4C878",
      mango:     "#E8792B",
      ink:       "#0E0A10"
    },

    fontHeading: "Fraunces",
    fontBody: "Sora",
    fontHeadingUrl: "@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&display=swap');",
    fontBodyUrl: "@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap');",

    eyebrow: "ПОРТФОЛІО",
    title: "Приклади сайтів",
    subheading: "Реальні проєкти, зроблені для клієнтів. Кожен сайт -- індивідуальний дизайн під нішу й характер бренду.",

    /* --- Приклади сайтів ---
       Додавай нові об'єкти в цей масив за тим самим зразком --
       картка й посилання зʼявляться автоматично, без правки вёрстки.
       screenshot -- необов'язково: якщо шлях порожній (""), картка
       покаже красиву заглушку з назвою замість скріншота. */
    examples: [
      {
        niche: "Кондитерська",
        title: "Dr. Macaron",
        description: "Лендінг для бренду макаронс ручної роботи -- каталог смаків, відгуки з Instagram, форма замовлення.",
        screenshot: "",
        url: "https://zesty-manatee-9ac71f.netlify.app"
      },
       /* закоментовано -- поки не додаємо в приклади
    {
        niche: "AI Content Studio",
        title: "AI Reels Creator",
        description: "Наш власний демо-сайт -- Reels, реклама та AI-візуали, створені без камери й студії.",
        screenshot: "",
        url: "https://gregarious-figolla-b97cef.netlify.app"
      },
      */
      {
        niche: "Розваги / туризм",
        title: "Flight Dream",
        description: "Сайт для польотів на повітряній кулі в Києві -- етапи польоту, відгуки, галерея, замовлення.",
        screenshot: "",
        url: "https://bravely-tall-yoga.tilda.ws/"
      },
      {
        niche: "Доставка їжі",
        title: "Суші магазин",
        description: "Каталог ролів та суші з доставкою по Києву за 60 хвилин, акції та онлайн-замовлення.",
        screenshot: "",
        url: "https://bravely-tall-yoga.tilda.ws/sushi"
      },
      {
        niche: "Клінінгові послуги",
        title: "Клінінг",
        description: "Сайт для клінінгової компанії -- види прибирання, розрахунок вартості, заявка з знижкою 10%.",
        screenshot: "",
        url: "https://bravely-tall-yoga.tilda.ws/clining"
      }
      /* приклад наступного об'єкта -- просто скопіюй і зміни:
      {
        niche: "Назва ніші",
        title: "Назва проєкту",
        description: "Короткий опис одним-двома реченнями.",
        screenshot: "assets/example6.png",
        url: "https://посилання-на-сайт"
      }
      */
    ],

    ctaText: "Хочеш такий самий сайт для свого бренду?",
    ctaButtonText: "Обговорити свій проєкт",
    ctaButtonUrl: "https://ig.me/m/new_ai_life"
  };

  /* ==========================================================
     СТИЛІ
     ========================================================== */
  var css = ""
    + CONFIG.fontHeadingUrl + "\n"
    + CONFIG.fontBodyUrl + "\n"
    + "#exPage{"
    +   "--ex-bg:" + CONFIG.colors.bg + ";"
    +   "--ex-bg2:" + CONFIG.colors.bg2 + ";"
    +   "--ex-cream:" + CONFIG.colors.cream + ";"
    +   "--ex-gold:" + CONFIG.colors.gold + ";"
    +   "--ex-gold-soft:" + CONFIG.colors.goldSoft + ";"
    +   "--ex-mango:" + CONFIG.colors.mango + ";"
    +   "--ex-ink:" + CONFIG.colors.ink + ";"
    +   "--ex-font-heading:'" + CONFIG.fontHeading + "', serif;"
    +   "--ex-font-body:'" + CONFIG.fontBody + "', sans-serif;"
    + "}"
    + "*{box-sizing:border-box;}"
    + "html,body{margin:0;padding:0;}"
    + "body{background:var(--ex-bg);}"
    + ".ex-page{position:relative;overflow:hidden;background:radial-gradient(120% 130% at 78% 4%, var(--ex-bg2) 0%, var(--ex-bg) 60%);padding:70px 32px 110px;font-family:var(--ex-font-body);min-height:100vh;}"
    + ".ex-inner{position:relative;z-index:2;max-width:1100px;margin:0 auto;}"

    + ".ex-decor{position:absolute;inset:0;z-index:1;pointer-events:none;}"
    + ".ex-glow{position:absolute;border-radius:50%;filter:blur(70px);}"
    + ".ex-glow--1{width:480px;height:480px;background:var(--ex-mango);opacity:.14;top:-180px;right:-100px;}"
    + ".ex-glow--2{width:420px;height:420px;background:var(--ex-gold);opacity:.1;bottom:-200px;left:-140px;}"

    + ".ex-back{display:inline-flex;align-items:center;gap:6px;color:var(--ex-cream) !important;opacity:.6;text-decoration:none !important;font-size:13.5px;font-weight:500;margin-bottom:46px;transition:opacity .2s ease;}"
    + ".ex-back:hover{opacity:1;}"

    + ".ex-eyebrow{font-weight:600;font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ex-gold-soft);margin:0 0 18px;}"
    + ".ex-title{font-family:var(--ex-font-heading);font-weight:400;color:var(--ex-cream);font-size:52px;line-height:1.1;letter-spacing:-.01em;margin:0 0 20px;}"
    + ".ex-sub{font-size:16.5px;line-height:1.7;color:var(--ex-cream);opacity:.65;max-width:560px;margin:0 0 56px;}"
    + "@media(max-width:600px){.ex-title{font-size:36px;}.ex-page{padding:50px 20px 80px;}}"

    + ".ex-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:26px;margin-bottom:70px;}"

    + ".ex-card{display:flex;flex-direction:column;border-radius:18px;overflow:hidden;background:rgba(255,255,255,.03);border:1px solid rgba(246,238,224,.09);text-decoration:none !important;transition:transform .25s ease, border-color .25s ease, box-shadow .25s ease;}"
    + ".ex-card:hover,.ex-card:focus-visible{transform:translateY(-5px);border-color:rgba(228,200,120,.4);box-shadow:0 24px 46px -20px rgba(0,0,0,.6);}"
    + ".ex-card:focus-visible{outline:2px solid var(--ex-gold-soft);outline-offset:2px;}"

    + ".ex-card__shot{position:relative;aspect-ratio:16/10;background:linear-gradient(135deg, var(--ex-bg2), var(--ex-ink));display:flex;align-items:center;justify-content:center;overflow:hidden;}"
    + ".ex-card__shot img{width:100%;height:100%;object-fit:cover;display:block;}"
    + ".ex-card__shot-placeholder{font-family:var(--ex-font-heading);font-style:italic;font-size:26px;color:var(--ex-gold-soft);opacity:.55;text-align:center;padding:0 20px;}"

    + ".ex-card__body{padding:22px 22px 24px;display:flex;flex-direction:column;gap:8px;flex:1;}"
    + ".ex-card__niche{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ex-mango);}"
    + ".ex-card__title{font-family:var(--ex-font-heading);font-size:22px;color:var(--ex-cream);margin:0;}"
    + ".ex-card__desc{font-size:14px;line-height:1.6;color:var(--ex-cream);opacity:.62;margin:0 0 6px;flex:1;}"
    + ".ex-card__link{display:inline-flex;align-items:center;gap:6px;font-size:13.5px;font-weight:600;color:var(--ex-gold-soft) !important;}"
    + ".ex-card__link svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;transition:transform .2s ease;}"
    + ".ex-card:hover .ex-card__link svg{transform:translate(2px,-2px);}"

    + ".ex-cta{border-top:1px solid rgba(246,238,224,.12);padding-top:46px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:20px;}"
    + ".ex-cta__text{font-family:var(--ex-font-heading);font-size:24px;color:var(--ex-cream);margin:0;}"
    + ".ex-cta__btn{display:inline-flex;align-items:center;justify-content:center;padding:16px 27px;border-radius:999px;font-weight:600;font-size:14.5px;text-decoration:none !important;background:var(--ex-mango);color:var(--ex-bg) !important;box-shadow:0 14px 28px -12px rgba(232,121,43,.7);transition:transform .18s ease, box-shadow .18s ease;white-space:nowrap;}"
    + ".ex-cta__btn:hover{transform:translateY(-2px);box-shadow:0 18px 32px -12px rgba(232,121,43,.8);}"
    + ".ex-cta__btn:focus-visible{outline:3px solid var(--ex-gold-soft);outline-offset:3px;}"

    + "@media(prefers-reduced-motion:reduce){.ex-card,.ex-cta__btn,.ex-card__link svg{transition:none !important;}}"
    ;

  var styleTag = document.createElement("style");
  styleTag.setAttribute("data-ex-page", "");
  styleTag.textContent = css;
  document.head.appendChild(styleTag);

  /* ==========================================================
     РОЗМІТКА -- заповнюється з CONFIG
     ========================================================== */
  document.getElementById("exEyebrow").textContent = CONFIG.eyebrow;
  document.getElementById("exTitle").textContent = CONFIG.title;
  document.getElementById("exSub").textContent = CONFIG.subheading;

  var grid = document.getElementById("exGrid");
  CONFIG.examples.forEach(function (item) {
    var card = document.createElement("a");
    card.className = "ex-card";
    card.href = item.url;
    card.target = "_blank";
    card.rel = "noopener";

    var shot = document.createElement("div");
    shot.className = "ex-card__shot";
    if (item.screenshot) {
      var img = document.createElement("img");
      img.src = item.screenshot;
      img.alt = "Скріншот сайту -- " + item.title;
      img.loading = "lazy";
      shot.appendChild(img);
    } else {
      var placeholder = document.createElement("span");
      placeholder.className = "ex-card__shot-placeholder";
      placeholder.textContent = item.title;
      shot.appendChild(placeholder);
    }
    card.appendChild(shot);

    var body = document.createElement("div");
    body.className = "ex-card__body";
    body.innerHTML =
      '<span class="ex-card__niche">' + item.niche + '</span>' +
      '<h2 class="ex-card__title">' + item.title + '</h2>' +
      '<p class="ex-card__desc">' + item.description + '</p>' +
      '<span class="ex-card__link">Переглянути сайт ' +
        '<svg viewBox="0 0 24 24"><path d="M7 17L17 7M9 7h8v8"/></svg>' +
      '</span>';
    card.appendChild(body);

    grid.appendChild(card);
  });

  document.getElementById("exCtaText").textContent = CONFIG.ctaText;
  var ctaBtn = document.getElementById("exCtaBtn");
  ctaBtn.textContent = CONFIG.ctaButtonText;
  ctaBtn.href = CONFIG.ctaButtonUrl;
})();
</script>

</body>
</html>
